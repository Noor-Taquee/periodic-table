version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "05:00"
      timezone: "Asia/Kolkata"
    commit-message:
      prefix: "build(deps)"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
